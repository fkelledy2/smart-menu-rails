:concurrency: 10
:queues:
  - [limited, 2]
  - [default, 1]
  - [mailers, 1]
  - [crm, 1]
  - [low_priority, 1]

:schedule:
  expire_dining_sessions:
    cron: "*/5 * * * *"  # every 5 minutes
    class: "ExpireDiningSessionsJob"
    queue: "default"
  product_enrichment_refresh:
    cron: "0 * * * *"  # hourly
    class: "ProductEnrichmentRefreshJob"
    queue: "low_priority"
  sitemap_generator:
    cron: "0 3 * * *"  # 3am UTC nightly
    class: "SitemapGeneratorJob"
    queue: "low_priority"
  explore_page_generator:
    cron: "30 3 * * *"  # 3:30am UTC nightly, after sitemap
    class: "ExplorePageGeneratorJob"
    queue: "low_priority"
  end_expired_menu_experiments:
    cron: "*/15 * * * *"  # every 15 minutes
    class: "EndExpiredMenuExperimentsJob"
    queue: "default"
  update_dining_patterns:
    cron: "0 2 * * *"  # 2am UTC nightly
    class: "UpdateDiningPatternsJob"
    queue: "low_priority"
